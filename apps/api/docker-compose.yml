services:
  postgres:
    image: postgres:16-alpine
    container_name: hausly-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hausly
    ports:
      - "5433:5432"
    volumes:
      - hausly_pgdata:/var/lib/postgresql/data

volumes:
  hausly_pgdata: